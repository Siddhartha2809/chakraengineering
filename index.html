<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- 1. BROWSER TAB TITLE (Optimized with location) -->
    <title>Chakra Engineering Works | Top Engineering Solutions in Visakhapatnam</title>

    <!-- 2. TASKBAR & TAB ICON -->
    <link rel="icon" type="image/jpeg" href="/logo.jpg" />

    <!-- 3. CORE SEO METADATA -->
    <!-- Expanded description with strong keywords for Google Search -->
    <meta name="description" content="Chakra Engineering Works provides top-tier engineering, heavy mechanical, and manufacturing solutions in Visakhapatnam. Contact us for premium industrial services." />
    
    <!-- SEO Keywords (Helps indexing for specific search phrases) -->
    <meta name="keywords" content="Chakra Engineering Works, engineering works Visakhapatnam, mechanical engineering Vizag, manufacturing solutions, heavy mechanical applications, industrial engineering Andhra Pradesh, custom fabrication" />
    
    <meta name="author" content="Chakra Engineering Works" />

    <!-- 4. OPEN GRAPH METADATA (For sharing links on WhatsApp, LinkedIn, etc.) -->
    <meta property="og:title" content="Chakra Engineering Works | Visakhapatnam" />
    <meta property="og:description" content="Premium engineering, mechanical, and manufacturing solutions based in Visakhapatnam. Discover our industrial services today." />
    <meta property="og:site_name" content="Chakra Engineering Works" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://chakra-engineering-web.vercel.app/" />
    
    <!-- 5. GOOGLE STRUCTURED DATA (Schema.org) -->
    <!-- Helps Google fully understand your business details -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "Chakra Engineering Works",
      "description": "Premium engineering and manufacturing solutions for heavy mechanical applications.",
      "url": "https://chakra-engineering-web.vercel.app/",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Visakhapatnam",
        "addressRegion": "Andhra Pradesh",
        "addressCountry": "IN"
      },
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://chakra-engineering-web.vercel.app/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
