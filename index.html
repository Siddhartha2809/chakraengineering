<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- 1. BROWSER TAB TITLE -->
    <title>Chakra Engineering Works</title>

    <!-- 2. TASKBAR & TAB ICON -->
    <!-- Type is set to image/jpeg to match your .jpg file inside the public folder -->
    <link rel="icon" type="image/jpeg" href="/logo.jpg" />

    <!-- 3. SEO & SITE NAME METADATA -->
    <!-- This overrides the "Vercel" name in Google Search Results -->
    <meta name="description" content="Chakra Engineering Works - Premium engineering and manufacturing solutions in Visakhapatnam." />
    <meta property="og:title" content="Chakra Engineering Works" />
    <meta property="og:site_name" content="Chakra Engineering Works" />
    <meta property="og:type" content="website" />
    
    <!-- 4. GOOGLE STRUCTURED DATA -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Chakra Engineering Works",
      "url": "https://chakra-engineering-web.vercel.app/",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://chakra-engineering-web.vercel.app/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
